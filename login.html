<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký | Trợ Lý Học Đường</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fe 0%, #eef2ff 100%); min-height: 100vh; }
        .page { display: flex; flex-direction: column; min-height: 100vh; }
        .header { background-color: rgba(255,255,255,0.96); backdrop-filter: blur(8px); border-bottom: 1px solid #eef2f6; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.35rem; text-decoration: none; color: #0f172a; }
        .brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, #2563eb, #1e40af); color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.4rem; }
        .btn-outline { background: transparent; color: #0f172a; border: 1px solid #cbd5e1; padding: 8px 20px; border-radius: 40px; text-decoration: none; font-weight: 500; transition: all 0.2s; }
        .btn-outline:hover { background: #f1f5f9; border-color: #2563eb; }
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
        .auth-card { max-width: 500px; width: 100%; background: white; border-radius: 48px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); padding: 48px 40px; }
        .auth-header { text-align: center; margin-bottom: 36px; }
        .auth-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; color: #0f172a; }
        .auth-header p { color: #475569; font-size: 0.95rem; }
        .tab-buttons { display: flex; gap: 12px; background: #f1f5f9; padding: 6px; border-radius: 60px; margin-bottom: 32px; }
        .tab-btn { flex: 1; padding: 12px 20px; border: none; background: transparent; font-weight: 600; border-radius: 40px; cursor: pointer; font-family: inherit; transition: all 0.2s; color: #475569; }
        .tab-btn.active { background: white; color: #2563eb; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .auth-form { display: none; }
        .auth-form.active-form { display: block; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; color: #1e293b; }
        .form-group input, .form-group select { width: 100%; padding: 14px 18px; font-family: 'Inter', sans-serif; font-size: 0.95rem; border: 1.5px solid #e2e8f0; border-radius: 28px; background: #fefefe; outline: none; transition: all 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-submit { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 44px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.25s; margin-top: 8px; }
        .btn-submit:hover { background: #1e293b; transform: translateY(-2px); }
        .alert-message { padding: 12px 16px; border-radius: 28px; margin-bottom: 20px; font-size: 0.85rem; display: none; }
        .alert-error { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
        .alert-success { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
        .footer { border-top: 1px solid #eef2f6; background: #ffffff; padding: 24px 32px; text-align: center; font-size: 0.8rem; color: #5b6e8c; }
        @media (max-width: 560px) { .auth-card { padding: 32px 24px; } .header-inner { padding: 0 20px; } }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <div class="header-inner">
            <a href="trang chủ.html" class="brand">
                <div class="brand-mark">H</div>
                <div>Trợ Lý Học Đường</div>
            </a>
            <a href="trang chủ.html" class="btn-outline">← Về trang chủ</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>✨ Chào mừng bạn</h1>
                <p>Đăng nhập hoặc tạo tài khoản để bắt đầu hành trình học tập thông minh</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="login">Đăng nhập</button>
                <button class="tab-btn" data-tab="register">Đăng ký</button>
            </div>

            <div id="alertBox" class="alert-message"></div>
            <div id="loginForm" class="auth-form active-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="btn-submit">🔐 Đăng nhập</button>
                <div style="text-align:center; font-size:0.85rem; margin-top: 20px; color:#64748b;">
                    Chưa có tài khoản? <a href="#" onclick="switchTab('register')" style="color:#2563eb; font-weight:600;">Đăng ký ngay</a>
                </div>
            </div>
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" id="regFullname" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="regEmail" placeholder="hocsinh@example.com">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="regPhone" placeholder="0987654321">
                </div>
                <div class="form-group">
                    <label>Lớp *</label>
                    <select id="regGrade">
                        <option value="10">Lớp 10</option>
                        <option value="11" selected>Lớp 11</option>
                        <option value="12">Lớp 12</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu *</label>
                    <input type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu">
                </div>
                <button onclick="handleRegister()" class="btn-submit">🚀 Tạo tài khoản miễn phí</button>
                <div style="text-align:center; font-size:0.85rem; margin-top: 20px; color:#64748b;">
                    Đã có tài khoản? <a href="#" onclick="switchTab('login')" style="color:#2563eb; font-weight:600;">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2025 Trợ Lý Học Đường — Nền tảng AI cá nhân hóa cho học sinh THPT</p>
    </footer>
</div>

<script src="auth.js"></script>
<script>
    function showAlert(message, isError = true) {
        const alertBox = document.getElementById('alertBox');
        alertBox.textContent = message;
        alertBox.className = `alert-message ${isError ? 'alert-error' : 'alert-success'}`;
        alertBox.style.display = 'block';
        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 4000);
    }

    function switchTab(tab) {
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        const tabBtns = document.querySelectorAll('.tab-btn');
        
        if (tab === 'login') {
            loginFormDiv.classList.add('active-form');
            registerFormDiv.classList.remove('active-form');
            tabBtns[0].classList.add('active');
            tabBtns[1].classList.remove('active');
        } else {
            registerFormDiv.classList.add('active-form');
            loginFormDiv.classList.remove('active-form');
            tabBtns[1].classList.add('active');
            tabBtns[0].classList.remove('active');
        }
        document.getElementById('alertBox').style.display = 'none';
    }

    // Xử lý đăng nhập
    window.handleLogin = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!email || !password) {
            showAlert('Vui lòng nhập đầy đủ email và mật khẩu', true);
            return;
        }

        try {
            const result = await window.login(email, password);
            if (result.success) {
                showAlert(`Chào mừng ${result.user.fullname} trở lại! Đang chuyển hướng...`, false);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        } catch (error) {
            showAlert(error.message, true);
        }
    };

    // Xử lý đăng ký
    window.handleRegister = async function() {
        const fullname = document.getElementById('regFullname').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const grade = document.getElementById('regGrade').value;
        const password = document.getElementById('regPassword').value.trim();
        const confirmPassword = document.getElementById('regConfirmPassword').value.trim();

        // Validation
        if (!fullname) {
            showAlert('Vui lòng nhập họ và tên', true);
            return;
        }
        if (!email) {
            showAlert('Vui lòng nhập email', true);
            return;
        }
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showAlert('Email không hợp lệ', true);
            return;
        }
        if (!password) {
            showAlert('Vui lòng nhập mật khẩu', true);
            return;
        }
        if (password.length < 6) {
            showAlert('Mật khẩu phải có ít nhất 6 ký tự', true);
            return;
        }
        if (password !== confirmPassword) {
            showAlert('Mật khẩu xác nhận không khớp', true);
            return;
        }

        try {
            const result = await window.register({
                fullname: fullname,
                email: email,
                password: password,
                grade: grade,
                phone: phone
            });
            
            if (result.success) {
                showAlert(`Đăng ký thành công! Chào mừng ${result.user.fullname} đến với Trợ Lý Học Đường`, false);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        } catch (error) {
            showAlert(error.message, true);
        }
    };

    // Gán sự kiện cho tab buttons
    document.querySelectorAll('.tab-btn').forEach((btn, index) => {
        btn.addEventListener('click', () => {
            switchTab(index === 0 ? 'login' : 'register');
        });
    });

    // Cho phép nhấn Enter để submit
    document.getElementById('loginEmail').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('regEmail').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleRegister();
    });
    document.getElementById('regPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleRegister();
    });
</script>
</body>
</html>
